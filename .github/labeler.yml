ci/cd:
  - changed-files:
      - any-glob-to-any-file: ".github/**"

docs:
  - changed-files:
      - any-glob-to-any-file:
          - "README.md"
          - "docs/**"

tests:
  - changed-files:
      - any-glob-to-any-file: "tests/**"

cli-core:
  - changed-files:
      - any-glob-to-any-file:
          - "clarity/main.clarity"
          - "clarity/runtime-chat/**"
          - "clarity/runtime-agents/**"
          - "clarity/claritycli.clarity"
          - "clarity/runtime-shared/**"

hitl-protocol:
  - changed-files:
      - any-glob-to-any-file:
          - "docs/hitl-broker-spec.md"
          - "clarity/connect/**"
          - "clarity/watch/**"
          - "clarity/list/**"
          - "clarity/answer/**"
          - "clarity/cancel/**"
          - "clarity/serve/**"

packaging:
  - changed-files:
      - any-glob-to-any-file:
          - "package.json"
          - "package-lock.json"
          - "scripts/**"

assets:
  - changed-files:
      - any-glob-to-any-file: "assets/**"
